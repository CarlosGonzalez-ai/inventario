<table id="tabla">
<tr>
<th>NO</th>
<th>ARTICULO</th>
<th>CANTIDAD PIEZAS INICIO</th>
<th>CANTIDAD PIEZAS ACTUAL</th>
<th>FOTO</th>
<th>JUSTIFICACION</th>
<th>UTILIZADOS</th>
<th>ELIMINAR</th>
</tr>
</table>

<script>
async function guardar() {
    let rows = document.querySelectorAll("#tabla tr");

    for (let i = 1; i < rows.length; i++) {
        let c = rows[i].cells;

        let articulo = c[1].innerText.trim();
        let inicio = parseInt(c[2].innerText) || 0;
        let actual = parseInt(c[3].innerText) || 0;
        if (articulo === "" && inicio === 0 && actual === 0) continue;

        let utilizados = inicio - actual;

        let inputFoto = c[4].querySelector("input[name='foto']");
let archivo = inputFoto?.files[0] || null;

let formData = new FormData();
formData.append("numero", c[0].innerText);
formData.append("articulo", articulo);
formData.append("inicio", inicio);
formData.append("actual", actual);
formData.append("justificacion", c[5].innerText);
formData.append("utilizados", utilizados);

formData.append("foto", archivo ? archivo : "");

try {
    let response = await fetch("/guardar", { method: "POST", body: formData });
    if (!response.ok) throw new Error("Error al guardar fila " + c[0].innerText);
} catch(e) {
    console.error(e);
}

        c[6].innerText = utilizados;
    }

    alert("Los datos se guardaron de forma correcta");
}  
</script>
<script>
window.onload = function(){
    cargarDatos()
}
function cargarDatos(){
    let tabla = document.getElementById("tabla")
tabla.innerHTML = `
<tr>
<th>NO</th>
<th>ARTICULO</th>
<th>CANTIDAD PIEZAS INICIO</th>
<th>CANTIDAD PIEZAS ACTUAL</th>
<th>FOTO</th>
<th>JUSTIFICACION</th>
<th>UTILIZADOS</th>
<th>ELIMINAR</th>
</tr>
`
    fetch("/cargar")
    .then(r=>r.json())
    .then(datos=>{
datos.forEach(fila=>{
  let nueva = tabla.insertRow();
nueva.innerHTML = `
<td>${fila[0]}</td>
<td contenteditable="true">${fila[1]}</td>
<td contenteditable="true">${fila[2]}</td>
<td contenteditable="true">${fila[3]}</td>
<td>
<img src="static/fotos/${fila[4]}" width="80" onclick="this.style.width='300px'" ondblclick="this.style.width='80px'">
<input type="file" name="foto" accept="image/*">
</td><td contenteditable="true">${fila[5]}</td>
<td>${fila[6]}</td>
<td><button onclick="eliminarFila(this, ${fila[0]})">Eliminar</button></td>
`;
});
    })
}
window.addEventListener("beforeunload", function(){
    guardar()
})
</script>
<script>
function mostrarTabla(){
    document.getElementById("inicio").style.display="none"
    document.getElementById("pantallaTabla").style.display="block"
    activarEdicion()
    mostrarColumnas([0,1,2,3,4,5,6,7])
}
function mostrarTotal(){
    document.getElementById("inicio").style.display="none"
    document.getElementById("pantallaTabla").style.display="block"
    bloquearEdicion()
    let rows = document.querySelectorAll("#tabla tr")
rows.forEach(row=>{
    if(row.cells.length == 0) return
    let c = row.cells
        c[0].style.display=""
        c[1].style.display=""
        c[4].style.display=""
        c[3].style.display=""
        c[2].style.display="none"
        c[5].style.display="none"
    })
}
function mostrarColumnas(columnasVisibles){
    let rows = document.querySelectorAll("#tabla tr")
    rows.forEach(row=>{
        for(let i=0;i<row.cells.length;i++){

            if(columnasVisibles.includes(i)){
                row.cells[i].style.display=""
            }else{
                row.cells[i].style.display="none"
            }
        }
    })
}
function mostrarInicio(){
    document.getElementById("inicio").style.display="block"
    document.getElementById("MENU").style.display="flex"
    document.getElementById("pantallaTabla").style.display="none"
}
function bloquearEdicion(){
    let rows = document.querySelectorAll("#tabla tr")
    rows.forEach(row=>{
        for(let i=0;i<row.cells.length;i++){
            row.cells[i].contentEditable = "false"
        }
    })

    document.querySelectorAll("#tabla button").forEach(b=>{
        b.disabled = true
    })

    document.querySelectorAll("#tabla input").forEach(i=>{
        i.disabled = true
    })
}cargarDatos
function activarEdicion(){
    let rows = document.querySelectorAll("#tabla tr")
    rows.forEach(row=>{
        if(row.cells[1]) row.cells[1].contentEditable = "true"
        if(row.cells[2]) row.cells[2].contentEditable = "true"
        if(row.cells[3]) row.cells[3].contentEditable = "true"
        if(row.cells[5]) row.cells[5].contentEditable = "true"
    })

    document.querySelectorAll("#tabla input").forEach(i=>{
        i.disabled = false
    })

    document.querySelectorAll("#tabla button").forEach(b=>{
        b.disabled = false
    })
}
function login(){
    let user = document.getElementById("usuario").value
    let pass = document.getElementById("password").value
    let usuarioCorrecto = "Almacen"
    let passwordCorrecto = "Vinculacion30"
    if(user === usuarioCorrecto && pass === passwordCorrecto){
        document.getElementById("login").style.display="none"
        document.getElementById("inicio").style.display="block"
        document.getElementById("MENU").style.display="flex"
    }else{
        document.getElementById("errorLogin").innerText="Usuario o contraseña incorrectos"
    }
}
function agregarFila(){
    let tabla = document.getElementById("tabla");
    let filas = tabla.rows.length;
    let numero = filas; 

    let fila = tabla.insertRow();

    fila.innerHTML = `
    <td>${numero}</td>
    <td contenteditable="true"></td>
    <td contenteditable="true">0</td>
    <td contenteditable="true">0</td>
    <td><input type="file" name="foto" accept="image/*"></td>
    <td contenteditable="true"></td>
<td>0</td>
<td><button onclick="eliminarFila(this, ${numero})">Eliminar fila ${numero}</button></td>
`;
}

</script>
<script>

async function subirFoto(input){
    let archivo = input.files[0];
    if(!archivo) return;

    let datos = new FormData();
    datos.append("foto", archivo, archivo.name);

    let respuesta = await fetch("/subir_foto",{
        method:"POST",
        body:datos
    });

    let resultado = await respuesta.json();
    console.log("imagen guardada:", resultado.nombre);
}
async function eliminarFila(btn, numero){
    try {
        let response = await fetch("/eliminar", {
            method:"POST",
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({numero})
        });
        let resultado = await response.json();
        if(resultado.status){
            btn.closest("tr").remove();
        }
    } catch(e){
        console.error(e);
        alert("No se puede eliminar");
    }
}
</script>

        return false;

    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
